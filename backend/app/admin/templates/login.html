<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster Admin — Login</title>
    <style>
        :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #f1f5f9; --primary: #3b82f6; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 2rem; width: 100%; max-width: 360px; }
        h1 { font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center; }
        label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; color: #94a3b8; }
        input { width: 100%; padding: 0.6rem; border: 1px solid var(--border); border-radius: 0.375rem; background: var(--bg); color: var(--text); font-size: 0.9rem; margin-bottom: 1rem; }
        button { width: 100%; padding: 0.65rem; background: var(--primary); color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.9rem; }
        button:hover { opacity: 0.9; }
        .error { color: var(--danger); font-size: 0.85rem; margin-bottom: 1rem; text-align: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>StockMaster Admin</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST" action="/admin/login">
            <label for="password">Admin Password</label>
            <input type="password" name="password" id="password" placeholder="Enter admin password" required autofocus>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
