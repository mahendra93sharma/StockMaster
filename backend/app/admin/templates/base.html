<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster Admin{% block title_suffix %}{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        nav .brand { font-weight: 700; font-size: 1.1rem; color: var(--primary); }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.875rem; }
        nav a:hover, nav a.active { color: var(--text); }
        h1 { font-size: 1.5rem; margin: 1.5rem 0 1rem; }
        h2 { font-size: 1.2rem; margin: 1rem 0 0.75rem; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-success { background: rgba(34,197,94,0.15); color: var(--success); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-info { background: rgba(59,130,246,0.15); color: var(--primary); }
        .btn {
            display: inline-block;
            padding: 0.4rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            background: var(--surface);
            color: var(--text);
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { border-color: var(--primary); color: var(--primary); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .flash { padding: 0.75rem 1rem; border-radius: 0.375rem; margin-bottom: 1rem; font-size: 0.875rem; }
        .flash-success { background: rgba(34,197,94,0.1); border: 1px solid var(--success); color: var(--success); }
        .flash-error { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: var(--danger); }
        .pnl-positive { color: var(--success); font-weight: 600; }
        .pnl-negative { color: var(--danger); font-weight: 600; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">StockMaster Admin</span>
        <a href="/admin/dashboard" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
        <a href="/admin/recommendations" {% if active_page == 'recommendations' %}class="active"{% endif %}>Recommendations</a>
        <a href="/admin/closed-trades" {% if active_page == 'closed_trades' %}class="active"{% endif %}>Closed Trades</a>
        <a href="/admin/scheduler" {% if active_page == 'scheduler' %}class="active"{% endif %}>Scheduler</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
