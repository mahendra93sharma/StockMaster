<table>
    <thead>
        <tr><th>Job</th><th>Started</th><th>Finished</th><th>Status</th><th>Items</th><th>Error</th></tr>
    </thead>
    <tbody>
        {% for run in runs %}
        <tr>
            <td>{{ run.job_name }}</td>
            <td>{{ run.started_at }}</td>
            <td>{{ run.finished_at or '—' }}</td>
            <td>
                {% if run.status == 'success' %}<span class="badge badge-success">success</span>
                {% elif run.status == 'failed' %}<span class="badge badge-danger">failed</span>
                {% else %}<span class="badge badge-warning">running</span>{% endif %}
            </td>
            <td>{{ run.items_ingested }}</td>
            <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis;">{{ run.error or '—' }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
