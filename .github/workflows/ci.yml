name: CI

on:
    push:
        branches: [ main, develop ]
    pull_request:
        branches: [ main, develop ]

env:
    PYTHON_VERSION: "3.12"
    JAVA_VERSION: "17"

jobs:
    backend-lint:
        name: Backend Lint
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: pip
            - run: pip install ruff mypy
            - run: ruff check app/ tests/
            - run: ruff format --check app/ tests/

    backend-test:
        name: Backend Tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: stockmaster
                    POSTGRES_PASSWORD: stockmaster
                    POSTGRES_DB: stockmaster_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U stockmaster" --health-interval
                    5s --health-timeout 3s --health-retries 5
        env:
            DATABASE_URL: postgresql+asyncpg://stockmaster:stockmaster@localhost:5432/stockmaster_test
            JWT_SECRET_KEY: ci-test-secret-key
            ENV: qa
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: pip
            - run: pip install -e ".[dev]"
            - run: pytest tests/ -v --tb=short -x
            - run: coverage run -m pytest tests/ && coverage report --fail-under=70

    android-build:
        name: Android Build Check
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: android
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: ${{ env.JAVA_VERSION }}
                  cache: gradle
            - run: chmod +x gradlew
            - run: ./gradlew assembleQaDebug --no-daemon --stacktrace

    docker-build:
        name: Docker Build Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - run: docker build -t stockmaster-backend:ci ./backend
